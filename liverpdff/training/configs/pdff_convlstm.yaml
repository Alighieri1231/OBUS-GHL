seed_everything: 42
trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: bf16-mixed
  logger:
    - class_path: lightning.pytorch.loggers.wandb.WandbLogger
      init_args:
        name: pdff_convlstm
        save_dir: &SAVDIR ./outputs/liverpdff/convlstm
        project: starter_package_liverpdff
        entity: ia-lim
        log_model: true
    - class_path: lightning.pytorch.loggers.tensorboard.TensorBoardLogger
      init_args:
        save_dir: *SAVDIR
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        save_top_k: -1
        every_n_epochs: 1
        monitor: val_patient_mae
        filename: "{epoch:03d}_{val_patient_mae:0.4f}_{val_mae:0.4f}"
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val_patient_mae
        mode: min
        patience: 10
        verbose: true
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
        log_momentum: false
  fast_dev_run: false
  max_epochs: 100
  min_epochs: 5
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 2
  log_every_n_steps: null
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: *SAVDIR
ckpt_path: null
model:
  class_path: liverpdff.models.Cnn2RnnRegressor
  init_args:
    cnn:
      class_path: ghlobus.models.TvCnnFeatureMap
      init_args:
        cnn_name: MobileNet_V2
        cnn_weights_name: IMAGENET1K_V2
        cnn_layer_id:
    rnn:
      class_path: ghlobus.models.TvConvLSTM
      init_args:
        input_size: 1280
        hidden_size: 128
        kernel_size: 3
        num_layers: 1
        num_groups: 4
        batch_first: true
        bias: true
    regressor:
      class_path: torch.nn.Linear
      init_args:
        in_features: 256
        out_features: 1
    lr: null
    clamp_min: 0.0
    clamp_max: 40.0
    target_transform: none
    report_dir: ./outputs/liverpdff/convlstm/reports
    save_epoch_reports: true
    report_every_n_epochs: 25
    loss:
      class_path: torch.nn.L1Loss
      init_args:
        reduction: mean
data:
  class_path: liverpdff.data.VideoDataModuleTraining
  init_args:
    root_dir: /mnt/castaneda_lab/GitHub/liver_ai_25/research_tasks/output_segmentations_total1
    excel_path: /mnt/castaneda_lab/GitHub/liver_ai_25/Clinical Liver Study enrollments.xlsx
    batch_size: 32
    num_workers: 8
    channels: 3
    frames: 64
    image_dims: [224, 224]
    frame_glob: "*_rgb.png"
    transforms: []
    augmentations: []
    use_stratified_sampler: true
    split_mode: random_stratified
    val_split: 0.5
    seed: 42
    split_csv_dir: ./outputs/liverpdff/splits
    return_metadata: true
    label_cols:
      - pdff
    path_col: sweep_dir
optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 5e-5
    betas: [0.9, 0.999]
    eps: 1.0e-08
    weight_decay: 0.0
    amsgrad: false
    foreach: null
    maximize: false
    capturable: false
    differentiable: false
    fused: false
lr_scheduler:
  class_path: torch.optim.lr_scheduler.ExponentialLR
  init_args:
    gamma: 0.95
